<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Observatório de Projetos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand">Observatório de Projetos</span>
            <div class="d-flex align-items-center">
                <span class="text-white me-3">Olá, {{ request.user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h5>Bem-vindo(a), {{ request.user.get_full_name|default:request.user.username }}!</h5>
        <p class="text-muted">Perfil: {{ request.user.get_perfil_display }}</p>
    </div>
</body>
</html>
